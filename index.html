<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="./assets/logo.png" />

    <link rel="stylesheet" href="./shared/navbar/navbar.css" />
    <link rel="stylesheet" href="./shared/theme.css" />
    <link rel="stylesheet" href="./shared/global.css" />
    <link rel="stylesheet" href="./shared/footer/footer.css" />
    <link rel="stylesheet" href="./shared/loader/loader.css" />
    <link rel="stylesheet" href="style.css" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find it</title>
  </head>

  <body>
    <div id="navbar-container"></div>

    <div class="title-panel">
      <h1>FindIt</h1>
      <p>Helping GECians reconnect with their lost belongings.</p>
      <div class="title-panel__Btns">
        <a
          href="./pages/post-lost/post-lost.html"
          class="btn-primary title-panel-btn"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-circle-plus-icon lucide-circle-plus"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M8 12h8" />
            <path d="M12 8v8" />
          </svg>
          <p>Report Lost Item</p>
        </a>
        <a
          href="./pages/post-found/post-found.html"
          class="btn-primary title-panel-btn report-found-btn"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-package-icon lucide-package"
          >
            <path
              d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"
            />
            <path d="M12 22V12" />
            <polyline points="3.29 7 12 12 20.71 7" />
            <path d="m7.5 4.27 9 5.15" />
          </svg>
          <p>Report Found Item</p>
        </a>
      </div>
    </div>

    <div class="recents">
      <div class="recents__heading-panel">
        <h4>Recent Lost Items</h4>
        <a href="./pages/lost/lost.html" class="view-all-btn"
          ><p>View All</p>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-arrow-right-icon lucide-arrow-right"
          >
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        </a>
      </div>

      <div class="recents__grid" id="lostItemsGrid"></div>
    </div>

    <div class="recents">
      <div class="recents__heading-panel">
        <h4>Recent Lost Items</h4>
        <a href="./pages/lost/lost.html" class="view-all-btn"
          ><p>View All</p>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-arrow-right-icon lucide-arrow-right"
          >
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        </a>
      </div>

      <div class="recents__grid" id="foundItemsGrid"></div>
    </div>

    <div id="loader-container"></div>

    <footer class="footer">
      <p>&copy; 2026 Findit. All rights reserved.</p>
    </footer>

    <script src="./shared/navbar/navbar.js"></script>
    <script type="module" src="./shared/navbar/navbar-component.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
