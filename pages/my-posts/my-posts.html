<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find it</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../shared/navbar/navbar.css" />
    <link rel="stylesheet" href="../../shared/theme.css" />
    <link rel="stylesheet" href="../../shared/global.css" />
    <link rel="stylesheet" href="../../shared/footer/footer.css" />
    <link rel="stylesheet" href="../../shared/loader/loader.css" />
    <link rel="stylesheet" href="my-posts.css" />
  </head>
  <body>
    <div id="loader-container"></div>

    <div id="app" style="display: none">
      <div id="navbar-container"></div>

      <div class="main-container">
        <header>
          <h3>My Posts</h3>
          <p>Manage all your lost and found item posts in one place</p>
        </header>

        <!-- EMPTY STATE -->
        <div class="noitems">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="60"
            height="60"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"
            />
            <path d="M12 22V12" />
            <polyline points="3.29 7 12 12 20.71 7" />
            <path d="m7.5 4.27 9 5.15" />
          </svg>
          <h3>No Posts Yet</h3>
          <p>You haven't posted any lost or found items yet.</p>
          <div class="btns">
            <a href="../post-lost/post-lost.html">Report Lost Item</a>
            <a href="../post-found/post-found.html">Report Found Item</a>
          </div>
        </div>

        <!-- LOST SECTION -->
        <div class="lost" style="display: none">
          <h3 id="lost-title">My Lost Items (0)</h3>
          <div id="lost-grid" class="items-grid"></div>
        </div>

        <!-- FOUND SECTION -->
        <div class="found" style="display: none">
          <h3 id="found-title">My Found Items (0)</h3>
          <div id="found-grid" class="items-grid"></div>
        </div>
      </div>

      <footer class="footer">
        <p>&copy; 2026 Findit. All rights reserved.</p>
      </footer>
    </div>

    <script src="../../shared/navbar/navbar.js"></script>
    <script
      type="module"
      src="../../shared/navbar/navbar-component.js"
    ></script>
    <script type="module" src="my-posts.js"></script>
  </body>
</html>
