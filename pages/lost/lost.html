<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../shared/navbar/navbar.css" />
    <link rel="stylesheet" href="../../shared/theme.css" />
    <link rel="stylesheet" href="../../shared/global.css" />
    <link rel="stylesheet" href="../../shared/footer/footer.css" />
    <link rel="stylesheet" href="../../shared/loader/loader.css" />

    <link rel="stylesheet" href="lost.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find it</title>
  </head>
  <body>
    <!-- navigation bar will be inserted here automatically.. dont touch This
    ignore -->
    <div id="app" style="display: none">
      <div id="navbar-container"></div>
      <div class="main-container">
        <header class="header">
          <h3>Lost Items</h3>
          <p>
            Browse through items that people have lost. If you found any of
            these items, please contact the owner.
          </p>

          <div class="input-field">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-search-icon lucide-search"
            >
              <path d="m21 21-4.34-4.34" />
              <circle cx="11" cy="11" r="8" />
            </svg>
            <input
              placeholder="Search by item name, description, or location.."
              type="text"
              name="search"
              id="search"
            />
          </div>
        </header>
        <section class="grid-lost" id="lostGrid"></section>
      </div>
      <footer class="footer">
        <p>&copy; 2026 Findit. All rights reserved.</p>
      </footer>
    </div>

    <div id="loader-container"></div>
  </body>
  <script src="../../shared/navbar/navbar.js"></script>
  <script type="module" src="../../shared/navbar/navbar-component.js"></script>
  <script type="module" src="lost.js"></script>
</html>
