  <body>
    <!-- navigation bar will be inserted here automatically.. dont touch This
    ignore -->
    <div id="navbar-container"></div>
    <!-- remove this line by the way.. this is just for your reference.. start coding from here..
  dont remove the footer at bottom.. 
  dont remove that div with navbar-container id.. thats for injecting navbar.. ignore that too.. -->
    
      <div class="header-container">
        <h1>Report Lost Item</h1>
        <p id="subline">Fill out the form below to report an item you've lost. Other users will be able to contact you if they find it.</p>
        
      </div>
      <div class="formbox">
        <form>
          <label class="formfill req">Item Name</label>
          <input class="textbox" type="text" placeholder="eg Black leather wallet" required>
          <label class="formfill req">Description</label>
          <textarea class="textbox1" placeholder="Provide a detailed description of the item..."  required></textarea>
          <label class="formfill req">Last seen Location</label>
          <input class="textbox" type="text" placeholder="eg City gym,locker room" required>
          <label class="formfill req">Date Lost </label>
          <input class="textbox" type="date" required>
          <label class="formfill"> Image (Optional)</label>
          <div class="upload-box" tabindex="0">
            <i class="fa-solid fa-arrow-up-from-bracket upload-icon"></i>
            <input type="file">
            <p id="image-text">Click to upload image</p>
          </div>
          <div class="btn">
            <button class="btn1" type="submit">Post Lost Item</button>
            <a href="index.html" class="btn2">Cancel</a>
          </div>

        </form>
      </div>
   
    <footer class="footer">

    </footer>
  </body>
