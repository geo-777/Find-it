<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="../../assets/logo.png" />

    <link rel="stylesheet" href="../../shared/navbar/navbar.css" />
    <link rel="stylesheet" href="../../shared/theme.css" />
    <link rel="stylesheet" href="../../shared/global.css" />
    <link rel="stylesheet" href="../../shared/footer/footer.css" />
    <link rel="stylesheet" href="../../shared/loader/loader.css" />

    <link rel="stylesheet" href="login.css" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Findit</title>
  </head>

  <body>
    <div id="app" style="display: none">
      <div id="navbar-container"></div>

      <div class="container">
        <div class="heading-panel">
          <div class="svg-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m10 17 5-5-5-5" />
              <path d="M15 12H3" />
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            </svg>
          </div>

          <h3>Welcome Back</h3>
          <p>Login to access your account</p>
        </div>

        <form class="form" id="loginForm">
          <div class="input-field">
            <label class="input-field__label">
              <span class="label-left">Email <span>*</span></span>
              <span class="error-text" id="emailError"></span>
            </label>

            <input id="email" type="email" placeholder="you@gectcr.ac.in" />
          </div>

          <div class="input-field">
            <label class="input-field__label">
              <span class="label-left">Password <span>*</span></span>
              <span class="error-text" id="passError"></span>
            </label>

            <input id="password" type="password" placeholder="••••••••" />
          </div>

          <button type="submit" id="loginBtn">
            <span class="btn-text">Login</span>
            <span class="spinner"></span>
          </button>

          <p>
            Don't have an account?
            <a href="../register/register.html">Register here</a>
          </p>
        </form>
      </div>

      <footer class="footer">
        <p>&copy; 2026 Findit. All rights reserved.</p>
      </footer>
    </div>
    <div id="loader-container"></div>

    <script src="../../shared/navbar/navbar.js"></script>
    <script
      type="module"
      src="../../shared/navbar/navbar-component.js"
    ></script>
    <script type="module" src="login.js"></script>
  </body>
</html>
