<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="../../assets/logo.png" />

    <link rel="stylesheet" href="../../shared/navbar/navbar.css" />
    <link rel="stylesheet" href="../../shared/theme.css" />
    <link rel="stylesheet" href="../../shared/global.css" />
    <link rel="stylesheet" href="../../shared/footer/footer.css" />
    <link rel="stylesheet" href="../../shared/loader/loader.css" />

    <link rel="stylesheet" href="found.css" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Findit</title>
  </head>

  <body>
    <div id="app" style="display: none">
      <div id="navbar-container"></div>

      <div class="main-container">
        <header class="header">
          <h3>Found Items</h3>

          <p>
            Browse items that people have found. If one of them belongs to you,
            please contact the person who reported it.
          </p>

          <div class="input-field">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m21 21-4.34-4.34" />
              <circle cx="11" cy="11" r="8" />
            </svg>

            <input
              type="text"
              id="search"
              placeholder="Search by item name, description, or location.."
            />
          </div>
        </header>

        <section class="grid-found" id="foundGrid"></section>
      </div>

      <footer class="footer">
        <p>&copy; 2026 Findit. All rights reserved.</p>
      </footer>
    </div>

    <div id="loader-container"></div>
  </body>

  <script src="../../shared/navbar/navbar.js"></script>
  <script type="module" src="../../shared/navbar/navbar-component.js"></script>
  <script type="module" src="found.js"></script>
</html>
