 <div class="container">

<h1>Report Found Item</h1>

<p>Fill out the form below to report an item you've found. The owner will be able to contact you.</p>

<form>



<label>Item Name <span class="required">*</span></label>
<input type="text" placeholder="e.g., Silver Watch">

<label>Description <span class="required">*</span></label>
<textarea placeholder="Provide a detailed description of the item..."></textarea>

<label>Found At Location <span class="required">*</span></label>
<input type="text" placeholder="e.g., City Gym, locker room">

<label>Date Found <span class="required">*</span></label>
<input type="date">

<label>Image <span class="required">*</span></label>

<label class="upload-box">
Click to upload an image
<input type="file">
</label>

<div class="buttons">
<button type="submit" class="post-btn">Post Found Item</button>
<button type="button" class="cancel-btn">Cancel</button>
</div>

</form>
