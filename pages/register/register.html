<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../shared/navbar/navbar.css" />
    <link rel="stylesheet" href="../../shared/theme.css" />
    <link rel="stylesheet" href="../../shared/global.css" />
    <link rel="stylesheet" href="../../shared/footer/footer.css" />

    <link rel="stylesheet" href="register.css" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find it</title>
  </head>

  <body>
    <div id="navbar-container"></div>

    <div class="container">
      <div class="heading-panel">
        <div class="svg-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
        </div>

        <h3>Create Account</h3>
        <p>Join Findit to report lost or found items</p>
      </div>

      <form class="form">
        <div class="input-field">
          <label class="input-field__label">
            <span class="label-left">Name <span>*</span></span>
          </label>
          <input id="name" type="text" placeholder="John Doe" />
        </div>

        <div class="input-field">
          <label class="input-field__label">
            <span class="label-left">Email <span>*</span></span>
          </label>
          <input id="email" type="email" placeholder="you@gectcr.ac.in" />
        </div>

        <div class="input-field">
          <label class="input-field__label">
            <span class="label-left">Phone <span>*</span></span>
          </label>
          <input id="mobNum" type="tel" placeholder="+91 94000 0000" />
        </div>

        <div class="input-field">
          <label class="input-field__label">
            <span class="label-left">Password <span>*</span></span>
          </label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>

        <button type="submit" id="registerBtn">
          <span class="btn-text">Register</span>
          <span class="spinner"></span>
        </button>

        <p>
          Already have an account?
          <a href="../login/login.html">Login here</a>
        </p>
      </form>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Findit. All rights reserved.</p>
    </footer>

    <script src="../../shared/navbar/navbar.js"></script>
    <script src="../../shared/navbar/navbar-component.js"></script>
    <script type="module" src="register.js"></script>
  </body>
</html>
