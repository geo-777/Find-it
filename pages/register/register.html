<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../shared/navbar/navbar.css" />
    <link rel="stylesheet" href="../../shared/theme.css" />
    <link rel="stylesheet" href="../../shared/global.css" />
    <link rel="stylesheet" href="../../shared/footer/footer.css" />

    <link rel="stylesheet" href="register.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find it</title>
  </head>
  <body>
    <!-- navigation bar will be inserted here automatically.. dont touch This
    ignore -->
    <div id="navbar-container"></div>

    <div class="container">
      <div class="heading-panel">
        <div class="svg-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
        </div>

        <h3>Create Account</h3>
        <p>Join Findit to report lost or found items</p>
      </div>

      <form class="form">
        <div class="input-field">
          <label class="input-field__label">Name <span>*</span></label>
          <input type="text" placeholder="John Doe" />
        </div>

        <div class="input-field">
          <label class="input-field__label">Email <span>*</span></label>
          <input type="email" placeholder="you@example.com" />
        </div>

        <div class="input-field">
          <label class="input-field__label">Phone <span>*</span></label>
          <input type="tel" placeholder="+1 (555) 000-0000" />
        </div>

        <div class="input-field">
          <label class="input-field__label">Password <span>*</span></label>
          <input type="password" placeholder="••••••••" />
        </div>

        <button type="submit">Register</button>

        <p>
          Already have an account?
          <a href="../login/login.html">Login here</a>
        </p>
      </form>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Findit. All rights reserved.</p>
    </footer>
  </body>
  <script src="../../shared/navbar/navbar.js"></script>
  <script src="../../shared/navbar/navbar-component.js"></script>
  <script src="register.js"></script>
</html>
