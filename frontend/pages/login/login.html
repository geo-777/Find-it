<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../shared/navbar/navbar.css" />
    <link rel="stylesheet" href="../../shared/theme.css" />
    <link rel="stylesheet" href="../../shared/global.css" />
    <link rel="stylesheet" href="../../shared/footer/footer.css" />

    <link rel="stylesheet" href="login.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find it</title>
  </head>
  <body>
    <!-- navigation bar will be inserted here automatically.. dont touch This
    ignore -->
    <div id="navbar-container"></div>

    <!-- remove this line by the way.. this is just for your reference.. start coding from here..
  dont remove the footer at bottom.. 
  dont remove that div with navbar-container id.. thats for injecting navbar.. ignore that too.. -->
    <div class="container">
      <div class="heading-panel">
        <div class="svg-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-log-in-icon lucide-log-in"
          >
            <path d="m10 17 5-5-5-5" />
            <path d="M15 12H3" />
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
          </svg>
        </div>

        <h3>Welcome Back</h3>
        <p>Login to access your account</p>
      </div>

      <form action="#" id="login-form" class="form">
        <div class="input-field">
          <label for="email" class="input-field__label"
            >Email <span>*</span></label
          >
          <input type="text" placeholder="you@example.com" id="email" />
        </div>

        <div class="input-field">
          <label for="pass" class="input-field__label"
            >Password <span>*</span></label
          >
          <input type="password" placeholder="••••••••" id="pass" />
        </div>
        <button type="submit">Login</button>

        <p>
          Don't have an account?
          <a href="../register/register.html">Register here</a>
        </p>
      </form>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Findit. All rights reserved.</p>
    </footer>
  </body>
  <script src="../../shared/navbar/navbar.js"></script>
  <script src="../../shared/navbar/navbar-component.js"></script>
  <script src="login.js"></script>
</html>
